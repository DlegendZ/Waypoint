<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
</head>
<body>
    <h2>WebSocket Test</h2>

    <h3>User login</h3>
    <input id="email" type="text" placeholder="email" value="budi@example.com">
    <input id="password" type="password" placeholder="password" value="password123">
    <button onclick="login()">Login</button>

    <h3>Connect WebSocket</h3>
    <button onclick="connect()">Connect</button>
    <button onclick="sendMessage()">Send</button>
    <button onclick="disconnect()">Disconnect</button>

    <div id="log" style="font-family:monospace; white-space:pre-line; margin-top:20px; border:1px solid #ccc; padding:10px;"></div>

    <script>
        let stompClient = null;

        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    log('Login gagal: ' + res.status);
                    return;
                }

                log('Login berhasil, cookie ter-set.');
            } catch (err) {
                log('Login error: ' + err);
            }
        }

        function connect() {
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = StompJs.Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                log('Connected: ' + frame);
                stompClient.subscribe('/topic/order/1', function (message) {
                    log('Received: ' + message.body);
                });
            }, function (error) {
                log('Connect error: ' + error);
            });
        }

        function sendMessage() {
            if (!stompClient || !stompClient.connected) {
                log('Belum connect.');
                return;
            }
            stompClient.send('/app/location/test', {}, JSON.stringify({ msg: 'hello, world!' }));
            log('Sent');
        }

        function disconnect() {
            if (stompClient) {
                stompClient.disconnect(function () {
                    log('Disconnected');
                });
            }
        }
    </script>
</body>
</html>
